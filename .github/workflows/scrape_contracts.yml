name: Scraper — Contratos PCSP

on:
  schedule:
    - cron: "0 6 * * *"   # 07:00 CET / 08:00 CEST
  workflow_dispatch:
    inputs:
      year:
        description: "Año a procesar (vacío = año actual)"
        type: string
        default: ""

jobs:
  scrape:
    name: "[${{ matrix.feed }}] Contratos PCSP"
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      matrix:
        feed: [licitaciones, menores]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: "Run scraper — ${{ matrix.feed }}"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -n "${{ github.event.inputs.year }}" ]; then
            python scripts/scrapers/pcsp_contracts.py --years ${{ github.event.inputs.year }} --feeds ${{ matrix.feed }}
          else
            python scripts/scrapers/pcsp_contracts.py --feeds ${{ matrix.feed }}
          fi

  enrich:
    name: Enriquecer adjudicatarios faltantes
    needs: scrape
    runs-on: ubuntu-latest
    if: always()
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Enriquecer adjudicatarios faltantes
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/scrapers/enrich_awarded_to.py

      - name: Revalidar caché de Vercel
        env:
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
        run: |
          if [ -n "$REVALIDATE_SECRET" ]; then
            curl -s -o /dev/null -w "%{http_code}" -X POST \
              -H "x-revalidate-secret: $REVALIDATE_SECRET" \
              https://ubrique-transparente.vercel.app/api/revalidate
          fi
