name: Daily contracts scrape

on:
  schedule:
    - cron: "0 6 * * *"   # 6:00 UTC (7:00 CET / 8:00 CEST)
  workflow_dispatch:       # permite ejecutar manualmente desde GitHub

jobs:
  scrape:
    name: "[${{ matrix.feed }}] Scrape contratos"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        feed: [licitaciones, agregacion, menores]
      fail-fast: false     # si falla un feed no cancela los otros

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run PCSP contracts scraper — ${{ matrix.feed }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/scrapers/pcsp_contracts.py --feeds ${{ matrix.feed }}
