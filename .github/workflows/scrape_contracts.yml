name: Scraper — Contratos PCSP

on:
  schedule:
    # Cada día a las 06:00 UTC (07:00 hora España invierno / 08:00 verano)
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      year:
        description: "Año a procesar (vacío = año actual)"
        type: string
        default: ""
      backfill:
        description: "Carga histórica 2018–actual (ignora 'year')"
        type: boolean
        default: false

jobs:
  scrape:
    name: Descargar y procesar contratos PCSP
    runs-on: ubuntu-latest
    # El ZIP de licitaciones del año actual supera 2 GB; con backfill son ~18 GB.
    # Se usa el máximo de GitHub Actions para cubrir ambos casos.
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ "${{ github.event.inputs.backfill }}" = "true" ]; then
            python scripts/scrapers/pcsp_contracts.py --backfill
          elif [ -n "${{ github.event.inputs.year }}" ]; then
            python scripts/scrapers/pcsp_contracts.py --years ${{ github.event.inputs.year }}
          else
            python scripts/scrapers/pcsp_contracts.py
          fi
