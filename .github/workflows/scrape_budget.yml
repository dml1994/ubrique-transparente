name: Scraper — Presupuesto Gobierto

on:
  schedule:
    # Primer día de cada mes a las 05:00 UTC
    - cron: "0 5 1 * *"
  workflow_dispatch:
    inputs:
      years:
        description: "Años a cargar, separados por espacios (vacío = todos)"
        type: string
        default: ""

jobs:
  scrape:
    name: Descargar presupuestos desde Gobierto
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -n "${{ github.event.inputs.years }}" ]; then
            python scripts/scrapers/gobierto_budget.py --years ${{ github.event.inputs.years }}
          else
            python scripts/scrapers/gobierto_budget.py
          fi
