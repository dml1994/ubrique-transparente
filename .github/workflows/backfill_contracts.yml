name: Backfill — Carga histórica PCSP

on:
  workflow_dispatch:
    inputs:
      start_year:
        description: "Año de inicio de la carga (por defecto 2018)"
        type: string
        default: "2018"
      end_year:
        description: "Año fin de la carga (por defecto año actual)"
        type: string
        default: ""

jobs:
  prepare:
    name: Calcular rango de años
    runs-on: ubuntu-latest
    outputs:
      years: ${{ steps.set.outputs.years }}
    steps:
      - name: Generar lista de años
        id: set
        run: |
          START=${{ github.event.inputs.start_year }}
          END=${{ github.event.inputs.end_year }}
          if [ -z "$END" ]; then
            END=$(date +%Y)
          fi
          YEARS=$(seq $START $END | jq -R . | jq -sc .)
          echo "years=$YEARS" >> $GITHUB_OUTPUT

  scrape:
    name: Año ${{ matrix.year }}
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      matrix:
        year: ${{ fromJson(needs.prepare.outputs.years) }}
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run scraper — ${{ matrix.year }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/scrapers/pcsp_contracts.py --years ${{ matrix.year }}
