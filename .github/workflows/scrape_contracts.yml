name: Scraper — Contratos PCSP

on:
  schedule:
    # Cada día a las 06:00 UTC (07:00 hora España invierno / 08:00 verano)
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      year:
        description: "Año a procesar (vacío = año actual)"
        type: string
        default: ""

jobs:
  scrape:
    name: Descargar y procesar contratos PCSP
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -n "${{ github.event.inputs.year }}" ]; then
            python scripts/scrapers/pcsp_contracts.py --years ${{ github.event.inputs.year }}
          else
            python scripts/scrapers/pcsp_contracts.py
          fi
